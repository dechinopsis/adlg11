<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos administrativos — Alto de la Gloria 11</title>
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
  </style>
</head>
<body>

  <style>
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.75} }

  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#212529;transition:opacity 0.5s;">
    <img src="logo.webp" style="height:110px;animation:pulse 1.8s ease-in-out infinite;">

  </div>
  <script>
    setTimeout(() => {
      const s = document.getElementById('splash');
      s.style.opacity = '0';
      setTimeout(() => s.remove(), 400);
    }, 1000);
  </script>

  <nav class="navbar bg-body-tertiary border-bottom px-3">
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <span class="navbar-brand mb-0 h1">Alto de la Gloria 11</span>
  </nav>

  <div class="offcanvas offcanvas-start" id="sidebar">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title">Menú</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link px-3 py-3" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link px-3 py-3" href="account-statements.html">Estados de cuenta</a></li>
        <li class="nav-item"><a class="nav-link px-3 py-3 active" href="expenses-report.html">Gastos administrativos</a></li>
      </ul>
    </div>
  </div>

  <main class="container py-4">
    <div id="content">
      <div class="text-center text-muted py-5">
        <div class="spinner-border spinner-border-sm me-2"></div>Cargando...
      </div>
    </div>
  </main>

  <footer class="border-top py-3 text-center">
    <img src="logo.webp" alt="Alto de la Gloria 11" style="height:28px;" class="me-2">
    <small class="text-muted">Powered by David Torres - UCSM</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function copyText(btn, text) {
      const done = () => {
        const original = btn.innerHTML;
        btn.innerHTML = '✓ Copiado';
        btn.classList.add('btn-success');
        btn.classList.remove('btn-outline-secondary');
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('btn-success');
          btn.classList.add('btn-outline-secondary');
        }, 1000);
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(done);
      } else {
        // Fallback for non-HTTPS
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done();
      }
    }

    const MONTH = { jan:'01', feb:'02', mar:'03', apr:'04', may:'05', jun:'06', jul:'07', aug:'08', sep:'09', oct:'10', nov:'11', dec:'12' };

    function periodToInt(id) {
      const mm = MONTH[id.slice(0, 3)];
      const yyyy = id.slice(3, 7);
      const base = parseInt(yyyy + mm) * 100;
      if (!id.includes('_')) return base;
      const extNum = parseInt(id.split('_ext')[1]) || 1;
      return base + extNum;
    }

    function resolveName(apt, periodId) {
      if (!apt.nameHistory) return apt.name;
      const p = periodToInt(periodId);
      const entry = apt.nameHistory.find(h => p <= periodToInt(h.until));
      return entry ? entry.name : apt.name;
    }

    function round2(n) { return Math.round(n * 100) / 100; }

    function fmt(n) {
      return `S/ ${n.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function calculatePayments(meta, expenses, periodId) {
      const periodInfo = expenses.periods.find(p => p.id === periodId);
      if (!periodInfo) throw new Error(`Period ${periodId} not found`);

      const totalCommons = periodInfo.commons.reduce((s, i) => s + i.total, 0);
      const totalOthers  = periodInfo.others.reduce((s, i) => s + i.total, 0);
      const totalExpenses = round2(totalCommons + totalOthers);

      const totalSecurity = periodInfo.security || 0;
      const securityPerApt = meta.apartments.length
        ? round2(totalSecurity / meta.apartments.length)
        : 0;

      const fixes = periodInfo.fixes || {};

      const commonsExpenses = periodInfo.commons.map(i => ({
        concept: meta.services[i.concept]?.shortLabel ?? i.concept,
        total: i.total
      }));
      const othersExpenses = periodInfo.others.map(i => ({
        concept: i.concept,
        total: i.total
      }));

      let totalAptExpenses = 0, totalAptSecurity = 0, totalAdjustments = 0, totalApt = 0;

      const payments = meta.apartments.map(apt => {
        const factor = apt.percentage / 100;
        const aptExpenses  = factor * totalExpenses;
        const adjustment   = fixes[apt.id] || 0;
        const finalTotal   = round2(aptExpenses + securityPerApt + adjustment);

        totalAptExpenses  += aptExpenses;
        totalAptSecurity  += securityPerApt;
        totalAdjustments  += adjustment;
        totalApt          += finalTotal;

        return {
          id:             apt.id,
          name:           resolveName(apt, periodId),
          percentage:     apt.percentage,
          total_expenses: round2(aptExpenses),
          total_security: round2(securityPerApt),
          adjustment:     round2(adjustment),
          total:          finalTotal,
        };
      });

      return {
        period_id:   periodId,
        period_name: periodInfo.label,
        payments,
        expenses: { commons: commonsExpenses, others: othersExpenses },
        totals: {
          total_expenses:     totalExpenses,
          total_security:     totalSecurity,
          total_apt_expenses: round2(totalAptExpenses),
          total_apt_security: round2(totalAptSecurity),
          total_adjustments:  round2(totalAdjustments),
          total_apt:          round2(totalApt),
          total:              round2(totalSecurity + totalExpenses + totalAdjustments),
        }
      };
    }

    // --- Main ---
    const params   = new URLSearchParams(location.search);
    const periodId = params.get('id');

    if (!periodId) {
      document.getElementById('content').innerHTML = '<p class="text-danger">Falta el parámetro ?id=</p>';
    } else {
      Promise.all([
        fetch('meta.json').then(r => r.json()),
        fetch('expenses.json').then(r => r.json()),
      ]).then(([meta, expenses]) => {
        const d = calculatePayments(meta, expenses, periodId);
        const periods    = expenses.periods;
        const periodIdx  = periods.findIndex(p => p.id === periodId);
        const prevPeriod = periods.slice(0, periodIdx).reverse().find(p => p.expensesReportPublished);
        const nextPeriod = periods.slice(periodIdx + 1).find(p => p.expensesReportPublished);
        const prevId     = prevPeriod?.id ?? null;
        const nextId     = nextPeriod?.id ?? null;
        const publishedPeriods = periods.filter(p => p.expensesReportPublished);
        const isLatest = publishedPeriods[publishedPeriods.length - 1]?.id === periodId;

        const commonsRows = d.expenses.commons.map(e => `
          <tr>
            <td>${e.concept}</td>
            <td class="text-end">${fmt(e.total)}</td>
          </tr>`).join('');

        const othersRows = d.expenses.others.map(e => `
          <tr>
            <td>${e.concept}</td>
            <td class="text-end">${fmt(e.total)}</td>
          </tr>`).join('');

        const paymentRows = d.payments.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.percentage}%</td>
            <td class="text-end">${fmt(p.total_expenses)}</td>
            <td class="text-end">${fmt(p.total_security)}</td>
            <td class="text-end">${p.adjustment !== 0 ? fmt(p.adjustment) : ''}</td>
            <td class="text-end fw-bold">${fmt(p.total)}</td>
          </tr>`).join('');

        const adjustmentRow = d.totals.total_adjustments !== 0 ? `
          <tr>
            <td class="text-muted">Ajustes</td>
            <td class="text-end">${fmt(d.totals.total_adjustments)}</td>
          </tr>` : '';

        document.getElementById('content').innerHTML = `
          <div class="mb-4">
            <h4 class="mb-3">Gastos administrativos — ${d.period_name}</h4>
            <div class="d-flex gap-2">
              ${prevId ? `<a href="?id=${prevId}" class="btn btn-outline-secondary flex-grow-1">‹ Anterior</a>` : `<button class="btn btn-outline-secondary flex-grow-1" disabled>‹ Anterior</button>`}
              ${nextId ? `<a href="?id=${nextId}" class="btn btn-outline-secondary flex-grow-1">Siguiente ›</a>` : `<button class="btn btn-outline-secondary flex-grow-1" disabled>Siguiente ›</button>`}
            </div>
          </div>

          <div class="d-flex gap-2 mb-4">
            <a href="monthlyReports/${periodId}_signed.pdf" target="_blank" class="btn btn-outline-secondary"><i class="bi bi-download me-1"></i>Reporte</a>
          </div>

          <!-- Detalle de gastos -->
          <h6 class="text-uppercase text-muted mb-2">Detalle de gastos</h6>
          <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
              <table class="table table-sm table-bordered">
                <thead class="table-secondary">
                  <tr><th>Gastos comunes</th><th class="text-end">Monto</th></tr>
                </thead>
                <tbody>${commonsRows}</tbody>
                <tfoot class="table-secondary">
                  <tr><td><strong>Total</strong></td><td class="text-end"><strong>${fmt(d.expenses.commons.reduce((s,e) => s+e.total, 0))}</strong></td></tr>
                </tfoot>
              </table>
            </div>
            <div class="col-12 col-md-6">
              <table class="table table-sm table-bordered">
                <thead class="table-secondary">
                  <tr><th>Otros gastos</th><th class="text-end">Monto</th></tr>
                </thead>
                <tbody>${othersRows}</tbody>
                <tfoot class="table-secondary">
                  <tr><td><strong>Total</strong></td><td class="text-end"><strong>${fmt(d.expenses.others.reduce((s,e) => s+e.total, 0))}</strong></td></tr>
                </tfoot>
              </table>
            </div>
          </div>

          <!-- Resumen -->
          <div class="d-flex justify-content-end mb-4">
            <table class="table table-sm w-auto">
              <tbody>
                <tr><td>Total gastos</td><td class="text-end ps-4">${fmt(d.totals.total_expenses)}</td></tr>
                <tr><td>Vigilancia</td><td class="text-end ps-4">${fmt(d.totals.total_security)}</td></tr>
                ${adjustmentRow}
                <tr class="fw-bold border-top"><td>Total del mes</td><td class="text-end ps-4">${fmt(d.totals.total)}</td></tr>
              </tbody>
            </table>
          </div>

          <!-- Distribución -->
          <h6 class="text-uppercase text-muted mb-2">Distribución</h6>
          <div class="row g-2 mb-4">
            ${d.payments.map(p => `
              <div class="col-12 col-md-6">
                <div class="accordion">
                  <div class="accordion-item">
                    <h2 class="accordion-header d-flex align-items-center">
                      <button class="accordion-button collapsed flex-grow-1 py-2" type="button"
                              data-bs-toggle="collapse" data-bs-target="#apt-${p.id}">
                        <div>
                          <div class="fw-bold">Dpto ${p.id}</div>
                          <small class="text-muted">${p.name}</small>
                        </div>
                      </button>
                      <div class="px-3 flex-shrink-0">
                        <button class="btn btn-sm btn-outline-secondary fw-bold"
                                onclick="copyText(this, '${p.total.toFixed(2)}')">${fmt(p.total)}</button>
                      </div>
                    </h2>
                    <div class="accordion-collapse collapse" id="apt-${p.id}">
                      <div class="accordion-body small py-2">
                        <div class="d-flex justify-content-between text-muted"><span>Porcentaje</span><span>${p.percentage}%</span></div>
                        <div class="d-flex justify-content-between text-muted"><span>Gastos</span><span>${fmt(p.total_expenses)}</span></div>
                        <div class="d-flex justify-content-between text-muted"><span>Vigilancia</span><span>${fmt(p.total_security)}</span></div>
                        <div class="d-flex justify-content-between text-muted"><span>Ajuste</span><span>${p.adjustment !== 0 ? fmt(p.adjustment) : '—'}</span></div>
                        <div class="d-flex justify-content-between fw-bold border-top mt-1 pt-1"><span>Total</span><span>${fmt(p.total)}</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>`).join('')}
          </div>

          ${isLatest ? `
          <!-- Payment methods — only shown for the latest period -->
          <h6 class="text-uppercase text-muted mb-2">Medios de pago</h6>
          <div class="row g-2 mb-4">
            <div class="col-6 col-md-3">
              <div class="card text-center p-2">
                <div class="fw-bold mb-1">YAPE</div>
                <img src="yape.png" class="mx-auto mb-1" style="height:90px;" />
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="copyText(this, '965134772')">965 134 772</button>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card text-center p-2">
                <div class="fw-bold mb-1">PLIN</div>
                <img src="plin.png" class="mx-auto mb-1" style="height:90px;" />
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="copyText(this, '965134772')">965 134 772</button>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card text-center p-2">
                <div class="fw-bold mb-1">BCP</div>
                <div class="d-flex flex-column gap-1 mt-1">
                  <button class="btn btn-sm btn-outline-secondary" onclick="copyText(this, '21505101809039')">215-05101809039</button>
                  <button class="btn btn-sm btn-outline-secondary" onclick="copyText(this, '00221510510180903921')"><small>CCI: 00221510510180903921</small></button>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card text-center p-2">
                <div class="fw-bold mb-1">Interbank</div>
                <div class="d-flex flex-column gap-1 mt-1">
                  <button class="btn btn-sm btn-outline-secondary" onclick="copyText(this, '3153045020699')">315-3045020699</button>
                  <button class="btn btn-sm btn-outline-secondary" onclick="copyText(this, '00331501304502069995')"><small>CCI: 00331501304502069995</small></button>
                </div>
              </div>
            </div>
          </div>` : ''}`;
      });
    }
  </script>

</body>
</html>
