<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos administrativos — Alto de la Gloria 11</title>
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
  </style>
</head>
<body>

  <style>
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.75} }

  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#212529;transition:opacity 0.5s;">
    <img src="logo.webp" style="height:110px;animation:pulse 1.8s ease-in-out infinite;">

  </div>
  <script>
    setTimeout(() => {
      const s = document.getElementById('splash');
      s.style.opacity = '0';
      setTimeout(() => s.remove(), 400);
    }, 1500);
  </script>

  <nav class="navbar bg-body-tertiary border-bottom px-3">
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <span class="navbar-brand mb-0 h1">Alto de la Gloria 11</span>
  </nav>

  <div class="offcanvas offcanvas-start" id="sidebar">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title">Menú</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link px-3 py-3" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link px-3 py-3" href="account-statements.html">Estados de cuenta</a></li>
        <li class="nav-item"><a class="nav-link px-3 py-3 active" href="expenses-report.html">Gastos administrativos</a></li>
      </ul>
    </div>
  </div>

  <main class="container py-4">
    <h4 class="mb-4">Gastos administrativos</h4>
    <div id="list">
      <div class="text-center text-muted py-5">
        <div class="spinner-border spinner-border-sm me-2"></div>Cargando...
      </div>
    </div>
  </main>

  <footer class="border-top py-3 text-center">
    <img src="logo.webp" alt="Alto de la Gloria 11" style="height:28px;" class="me-2">
    <small class="text-muted">Powered by David Torres - UCSM</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('expenses.json')
      .then(r => r.json())
      .then(data => {
        const list = document.getElementById('list');

        // Group published periods by year
        const byYear = {};
        data.periods.filter(p => p.expensesReportPublished).forEach(p => {
          const year = p.id.slice(3, 7);
          if (!byYear[year]) byYear[year] = [];
          byYear[year].push(p);
        });

        const years = Object.keys(byYear).sort((a, b) => b - a);
        Object.values(byYear).forEach(periods => periods.reverse());

        list.innerHTML = `<div class="accordion" id="accordion">` +
          years.map(year => {
            const isLatest = year === years[0];
            const rows = byYear[year].map(p => `
              <div class="d-flex justify-content-between align-items-center border-bottom py-3 ps-5 pe-3">
                <a href="expenses-report-detail.html?id=${p.id}" class="text-decoration-none">${p.label}</a>
                <a href="monthlyReports/${p.id}_signed.pdf" target="_blank" class="btn btn-sm btn-outline-secondary">PDF</a>
              </div>`
            ).join('');

            return `
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button ${isLatest ? '' : 'collapsed'}" type="button"
                    data-bs-toggle="collapse" data-bs-target="#year-${year}">
                    ${year}
                  </button>
                </h2>
                <div id="year-${year}" class="accordion-collapse collapse ${isLatest ? 'show' : ''}">
                  <div class="accordion-body px-0 py-0">
                    ${rows}
                  </div>
                </div>
              </div>`;
          }).join('') +
        `</div>`;
      });
  </script>

</body>
</html>
