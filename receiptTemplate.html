<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Recibo de Pago</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            margin: 20px auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 30px;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .content p {
            margin: 10px 0;
            font-size: 16px;
        }
        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
        }
        .signature {
            text-align: center;
            margin-top: 50px;
            flex: 1;
        }
        .signature p {
            margin: 5px 0;
        }
        .signature-line {
            border-top: 1px solid #333;
            width: 80%;
            margin: 0 auto;
            margin-bottom: 5px;
        }
        .admin-details {
            font-size: 14px;
            color: #555;
        }
        .right-align {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Recibo Simple de Pago</div>
        <div class="content">
            <p class="right-align"><strong>No.</strong> {{ receipt_number }}</p>
            <p class="right-align">Arequipa, {{ date }}</p>
            <br>
            <p><strong>Recibí de:</strong> {{ admin_full_name }}</p>
            <p><strong>La cantidad de:</strong> S/ {{ amount }}, {{ amount_words }}</p>
            <p><strong>Por concepto de:</strong> {{ concept }}</p>
            <p><strong>Medio de pago:</strong> {{ payment_method }}</p>
        </div>
        <div class="footer">
            <div class="signature">
                <div class="signature-line"></div>
                <p>{{ responsible }}</p>
            </div>
            <div class="signature">
                <div class="signature-line"></div>
                <p>{{ admin_short_name }}</p>
                <p class="admin-details">DNI {{ admin_id }}</p>
            </div>
        </div>
    </div>
</body>
</html>
